name: Build & Release

# PR branches: run tests and produce a dry-run build so you can inspect
# artifacts before merging.
# main: run tests, bump version (tag only — no commit back), build, release.
on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

# Prevent concurrent runs on the same ref.
concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ---------------------------------------------------------------------------
  # test — run the full test suite before building anything.
  # ---------------------------------------------------------------------------
  test:
    name: Run tests
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Qt system dependencies
        run: |
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            libegl1 \
            libxcb-cursor0 \
            libxcb1 \
            libx11-6 \
            libgl1

      - name: Install dependencies
        run: pip install -r requirements.txt

      - name: Run test suite
        env:
          QT_QPA_PLATFORM: offscreen
        run: python -m pytest tests/ -v

  # ---------------------------------------------------------------------------
  # bump_version — compute the next semver from git tags.
  #
  # On main (real release):
  #   - Creates and pushes a vX.Y.Z tag. The tag is the sole source of truth
  #     for the version — nothing is committed back to pyproject.toml.
  #
  # On a PR (dry-run):
  #   - Computes the version but does NOT create a tag.
  #   - Version string gets a "-pr-{number}" suffix.
  #   - The release job is skipped entirely; artifacts are still uploaded.
  #
  # Versioning rules:
  #   - Previous version is read from the latest vX.Y.Z git tag.
  #   - If any commit since that tag contains "[major]", bump major.
  #   - Otherwise bump minor and reset patch to 0.
  # ---------------------------------------------------------------------------
  bump_version:
    name: Bump version & collect changelog
    runs-on: ubuntu-22.04
    needs: test
    permissions:
      contents: write
    outputs:
      new_version: ${{ steps.bump.outputs.new_version }}
      tag: ${{ steps.bump.outputs.tag }}
      changelog: ${{ steps.bump.outputs.changelog }}
      is_real_release: ${{ steps.bump.outputs.is_real_release }}

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Compute version and collect changelog
        id: bump
        run: |
          IS_MAIN=$([[ "${{ github.ref }}" == "refs/heads/main" ]] && echo "true" || echo "false")

          # --- Find the most recent vX.Y.Z tag ---
          PREV_TAG=$(git tag --list 'v*.*.*' --sort=-version:refname | head -1)
          if [ -z "$PREV_TAG" ]; then
            PREV_VERSION=$(python3 -c "import tomllib; f=open('pyproject.toml','rb'); print(tomllib.load(f)['project']['version'])")
            PREV_TAG=""
          else
            PREV_VERSION="${PREV_TAG#v}"
          fi

          echo "Previous version: ${PREV_VERSION}"

          IFS='.' read -r MAJOR MINOR PATCH <<< "$PREV_VERSION"
          MAJOR=${MAJOR:-0}
          MINOR=${MINOR:-0}
          PATCH=${PATCH:-0}

          # --- Collect commits since the last tag ---
          if [ -n "$PREV_TAG" ]; then
            COMMITS=$(git log "${PREV_TAG}..HEAD" --pretty=format:"- %s (%h)" --no-merges)
          else
            COMMITS=$(git log --pretty=format:"- %s (%h)" --no-merges)
          fi

          # --- Decide bump type ---
          if echo "$COMMITS" | grep -qi '\[major\]'; then
            NEW_MAJOR=$((MAJOR + 1)); NEW_MINOR=0; NEW_PATCH=0
          else
            NEW_MAJOR=$MAJOR; NEW_MINOR=$((MINOR + 1)); NEW_PATCH=0
          fi

          NEW_VERSION="${NEW_MAJOR}.${NEW_MINOR}.${NEW_PATCH}"
          NEW_TAG="v${NEW_VERSION}"

          if [ "$IS_MAIN" = "true" ]; then
            echo "Real release: ${NEW_VERSION}"
            git config user.name  "github-actions[bot]"
            git config user.email "github-actions[bot]@users.noreply.github.com"
            git tag "$NEW_TAG"
            git push origin "$NEW_TAG"
            echo "is_real_release=true" >> "$GITHUB_OUTPUT"
          else
            PR_NUMBER="${{ github.event.pull_request.number }}"
            NEW_VERSION="${NEW_VERSION}-pr-${PR_NUMBER}"
            NEW_TAG="v${NEW_VERSION}"
            echo "Dry-run: ${NEW_VERSION} (no tag created)"
            echo "is_real_release=false" >> "$GITHUB_OUTPUT"
          fi

          if [ -z "$COMMITS" ]; then
            COMMITS="- No user-facing changes"
          fi

          {
            echo "new_version=${NEW_VERSION}"
            echo "tag=${NEW_TAG}"
            echo "changelog<<CHANGELOG_EOF"
            echo "$COMMITS"
            echo "CHANGELOG_EOF"
          } >> "$GITHUB_OUTPUT"

  # ---------------------------------------------------------------------------
  # build — matrix across Windows / Ubuntu / macOS.
  # ---------------------------------------------------------------------------
  build:
    name: Build (${{ matrix.os }})
    needs: bump_version
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: windows-latest
            artifact_name: TrenchChat-Setup
            artifact_ext: .exe
          - os: ubuntu-22.04
            artifact_name: trenchchat
            artifact_ext: .deb
          - os: macos-latest
            artifact_name: TrenchChat
            artifact_ext: -macos.dmg

    runs-on: ${{ matrix.os }}

    steps:
      - uses: actions/checkout@v4
        with:
          # On real releases check out the tagged commit; on PRs use the HEAD.
          ref: ${{ needs.bump_version.outputs.is_real_release == 'true' && needs.bump_version.outputs.tag || github.sha }}

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: "pip"

      - name: Install Python dependencies
        run: pip install -r requirements.txt pyinstaller>=6.0

      - name: Freeze application (PyInstaller)
        run: pyinstaller trenchchat.spec

      - name: Build Windows installer (Inno Setup)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          $version = "${{ needs.bump_version.outputs.new_version }}"
          $iscc = "C:\Program Files (x86)\Inno Setup 6\ISCC.exe"
          & $iscc /DAppVersion="$version" packaging\windows\trenchchat.iss
          $exe = Get-ChildItem dist\installer\*.exe | Select-Object -First 1
          if ($exe) { Copy-Item $exe.FullName "dist\TrenchChat-Setup-${version}.exe" }

      - name: Build Debian package
        if: runner.os == 'Linux'
        run: |
          VERSION="${{ needs.bump_version.outputs.new_version }}"
          bash packaging/linux/build-deb.sh "$VERSION"

      - name: Install create-dmg
        if: runner.os == 'macOS'
        run: brew install create-dmg

      - name: Build macOS disk image
        if: runner.os == 'macOS'
        run: |
          VERSION="${{ needs.bump_version.outputs.new_version }}"
          bash packaging/macos/build-dmg.sh "$VERSION"

      - name: Locate built artifact
        id: find_artifact
        shell: bash
        run: |
          if [ "$RUNNER_OS" = "Windows" ]; then
            ARTIFACT=$(find dist -name "TrenchChat-Setup-*.exe" | head -1)
          elif [ "$RUNNER_OS" = "Linux" ]; then
            ARTIFACT=$(find dist -name "trenchchat-*.deb" | head -1)
          else
            ARTIFACT=$(find dist -name "TrenchChat-*-macos.dmg" | head -1)
          fi
          echo "path=${ARTIFACT}" >> "$GITHUB_OUTPUT"
          echo "Artifact: ${ARTIFACT}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: installer-${{ matrix.os }}
          path: ${{ steps.find_artifact.outputs.path }}
          if-no-files-found: error

  # ---------------------------------------------------------------------------
  # release — publish a GitHub Release from the three built installers.
  # Skipped entirely on PRs.
  # ---------------------------------------------------------------------------
  release:
    name: Publish GitHub Release
    needs: [bump_version, build]
    if: needs.bump_version.outputs.is_real_release == 'true'
    runs-on: ubuntu-22.04
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4

      - name: Download all installer artifacts
        uses: actions/download-artifact@v4
        with:
          pattern: installer-*
          path: release-assets
          merge-multiple: true

      - name: List release assets
        run: ls -lh release-assets/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.bump_version.outputs.tag }}
          name: "TrenchChat ${{ needs.bump_version.outputs.new_version }}"
          body: |
            ## TrenchChat ${{ needs.bump_version.outputs.new_version }}

            ### What's in this release

            ${{ needs.bump_version.outputs.changelog }}

            ---

            ### Installation

            | Platform | File | Notes |
            |---|---|---|
            | Windows | `TrenchChat-Setup-*.exe` | Run the installer; upgrades existing installs in-place |
            | Ubuntu/Debian | `trenchchat-*.deb` | `sudo dpkg -i trenchchat-*.deb` |
            | macOS | `TrenchChat-*-macos.dmg` | Open and drag TrenchChat.app to Applications |

            ### User data

            Your identity, channels, and message history in `~/.trenchchat/` are
            preserved across upgrades on all platforms.

            > **Note:** Binaries are not code-signed. Windows will show a SmartScreen
            > warning; macOS will show an "unidentified developer" dialog. You can
            > bypass these in your OS security settings.
          files: release-assets/*
          draft: false
          prerelease: false
          generate_release_notes: false
          fail_on_unmatched_files: true
