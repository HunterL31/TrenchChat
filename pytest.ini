[pytest]
testpaths = tests
# Show full diffs on assertion failures
addopts = -v --tb=short
# Treat warnings as errors to keep the codebase clean
filterwarnings =
    error
    # Reticulum and LXMF emit deprecation warnings we don't control
    ignore::DeprecationWarning:RNS
    ignore::DeprecationWarning:LXMF
    ignore::DeprecationWarning:lxmf
    ignore::ResourceWarning